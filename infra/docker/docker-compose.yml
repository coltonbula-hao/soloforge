services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: soloforge-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-soloforge}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-soloforge_secret}
      POSTGRES_DB: ${POSTGRES_DB:-soloforge}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-soloforge} -d ${POSTGRES_DB:-soloforge}",
        ]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: soloforge-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ../../
      dockerfile: apps/api/Dockerfile
    container_name: soloforge-api
    env_file:
      - ../../.env
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: >
      sh -c "alembic upgrade head &&
             uvicorn soloforge_api.main:app --host 0.0.0.0 --port 8000 --reload"
    volumes:
      - ../../apps/api/src:/app/apps/api/src
      - ../../packages/ai-core/src:/app/packages/ai-core/src

  worker:
    build:
      context: ../../
      dockerfile: apps/worker/Dockerfile
    container_name: soloforge-worker
    env_file:
      - ../../.env
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    volumes:
      - ../../apps/worker/src:/app/apps/worker/src
      - ../../packages/ai-core/src:/app/packages/ai-core/src

  web:
    build:
      context: ../../
      dockerfile: apps/web/Dockerfile
    container_name: soloforge-web
    ports:
      - "3004:3000"
    env_file:
      - ../../.env
    depends_on:
      - api

volumes:
  postgres_data:
  redis_data:

[build-system]
requires = ["setuptools>=61.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "soloforge-ai"
version = "0.1.0"
requires-python = ">=3.11"
dependencies = [
    "langchain>=0.2.0",
    "langchain-anthropic>=0.1.0",
    "langchain-openai>=0.1.0",
    "httpx>=0.27.0",
    "pydantic>=2.7.0",
]

[tool.setuptools.packages.find]
where = ["src"]
